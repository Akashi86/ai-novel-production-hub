services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-novel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_novel}
      POSTGRES_USER: ${POSTGRES_USER:-ai_novel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ai_novel} -d ${POSTGRES_DB:-ai_novel}"]
      interval: 10s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.15.4
    container_name: ai-novel-qdrant
    restart: unless-stopped
    volumes:
      - qdrant_storage:/qdrant/storage

  migrate:
    profiles: ["migrate"]
    build:
      context: ..
      dockerfile: Dockerfile.api
      network: ${DOCKER_BUILD_NETWORK:-host}
      args:
        APT_MIRROR: ${APT_MIRROR:-http://mirrors.aliyun.com/debian}
        HTTP_PROXY: ${DOCKER_BUILD_HTTP_PROXY:-}
        HTTPS_PROXY: ${DOCKER_BUILD_HTTPS_PROXY:-}
        NO_PROXY: ${DOCKER_BUILD_NO_PROXY:-localhost,127.0.0.1,::1,mirrors.aliyun.com}
    image: ai-novel-production-hub-api:${APP_IMAGE_TAG:-latest}
    env_file:
      - .env.prod
    environment:
      NODE_ENV: production
      AI_NOVEL_DATABASE_MODE: postgresql
      DATABASE_URL: postgresql://${POSTGRES_USER:-ai_novel}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ai_novel}
    depends_on:
      postgres:
        condition: service_healthy
    command: ["/app/node_modules/.bin/prisma", "migrate", "deploy", "--config", "/app/server/prisma.config.ts"]

  api:
    build:
      context: ..
      dockerfile: Dockerfile.api
      network: ${DOCKER_BUILD_NETWORK:-host}
      args:
        APT_MIRROR: ${APT_MIRROR:-http://mirrors.aliyun.com/debian}
        HTTP_PROXY: ${DOCKER_BUILD_HTTP_PROXY:-}
        HTTPS_PROXY: ${DOCKER_BUILD_HTTPS_PROXY:-}
        NO_PROXY: ${DOCKER_BUILD_NO_PROXY:-localhost,127.0.0.1,::1,mirrors.aliyun.com}
    image: ai-novel-production-hub-api:${APP_IMAGE_TAG:-latest}
    container_name: ai-novel-api
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      ALLOW_LAN: "false"
      AI_NOVEL_DATABASE_MODE: postgresql
      DATABASE_URL: postgresql://${POSTGRES_USER:-ai_novel}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ai_novel}
      QDRANT_URL: http://qdrant:6333
      IMAGE_STORAGE_ROOT: /app/storage/generated-images
    volumes:
      - api_storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started

  web:
    build:
      context: ..
      dockerfile: Dockerfile.web
      network: ${DOCKER_BUILD_NETWORK:-host}
      args:
        VITE_API_BASE_URL: ${PUBLIC_API_BASE_URL:-/api}
        HTTP_PROXY: ${DOCKER_BUILD_HTTP_PROXY:-}
        HTTPS_PROXY: ${DOCKER_BUILD_HTTPS_PROXY:-}
        NO_PROXY: ${DOCKER_BUILD_NO_PROXY:-localhost,127.0.0.1,::1,mirrors.aliyun.com}
    image: ai-novel-production-hub-web:${APP_IMAGE_TAG:-latest}
    container_name: ai-novel-web
    restart: unless-stopped
    depends_on:
      - api

  gateway:
    image: nginx:1.27-alpine
    container_name: ai-novel-gateway
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT:-8080}:80"
    volumes:
      - ./nginx/ai-novel-gateway.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - api

volumes:
  postgres_data:
  qdrant_storage:
  api_storage:
